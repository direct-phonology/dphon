name: release

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    name: publish to pyPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up python
        run: uv python install
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
