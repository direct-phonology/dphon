name: release

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    name: publish to pyPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Set up python
        run: uv python install
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
